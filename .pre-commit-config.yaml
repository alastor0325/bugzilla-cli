repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-test
        name: cargo test (unit)
        entry: cargo test --lib
        language: system
        pass_filenames: false
        always_run: true
      - id: no-secrets
        name: No API keys in source
        entry: >-
          bash -c 'grep -rn "BUGZILLA_BOT_API_KEY\s*=\s*[A-Za-z0-9_-]\{8,\}" src/ && echo "FAIL: hardcoded key" && exit 1 || exit 0'
        language: system
        pass_filenames: false
