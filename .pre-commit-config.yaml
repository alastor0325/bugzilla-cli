repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path ~/projects/bugzilla-cli/Cargo.toml -- --check
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path ~/projects/bugzilla-cli/Cargo.toml -- -D warnings
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-test
        name: cargo test (unit)
        entry: cargo test --manifest-path ~/projects/bugzilla-cli/Cargo.toml --lib
        language: system
        pass_filenames: false
        always_run: true
      - id: no-secrets
        name: No API keys in source
        entry: bash -c 'grep -rn "API_KEY\s*=" src/ && echo "FAIL: hardcoded key" && exit 1 || exit 0'
        language: system
        pass_filenames: false
